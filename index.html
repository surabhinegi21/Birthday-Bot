<script>

// ── DATA ────────────────────────────────────────────────────────────────────
const ADMIN_PWD_HASH = 'd07a852aa3be5d9bb5041f3410ff2bddbe4106d33265c10b15512005d13c7d16';

async function hashPassword(pwd) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pwd));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

const COLORS = [
  { main:'#D85A30', light:'#FAECE7' },
  { main:'#378ADD', light:'#E6F1FB' },
  { main:'#1D9E75', light:'#E1F5EE' },
  { main:'#7F77DD', light:'#EEEDFE' },
  { main:'#D4537E', light:'#FBEAF0' },
  { main:'#EF9F27', light:'#FAEEDA' },
  { main:'#639922', light:'#EAF3DE' },
  { main:'#185FA5', light:'#E6F1FB' },
];

// ── TEAM ────────────────────────────────────────────────────────────────────
function defaultTeam() {
  return [
    { email:'piyush.bansal@adidas.com', bday:{m:6, d:8}, name:'Piyush Bansal', role:'Data Scientist' },
    { email:'rahul.nagpal@adidas.com', bday:{m:6, d:8}, name:'Rahul Nagpal', role:'ML Engineer' },
    { email:'surabhi.negi@adidas.com', bday:{m:11,d:21}, name:'Surabhi Negi', role:'Insights Manager' },
  ];
}

let team = defaultTeam();

// ── HELPERS ─────────────────────────────────────────────────────────────────
function initials(name){ return name.split(' ').map(n=>n[0]).join('').toUpperCase(); }
function toFirstName(name){ return name.split(' ')[0]; }

// ── DATE LOGIC ──────────────────────────────────────────────────────────────
const today = new Date();
const todayM = today.getMonth()+1;
const todayD = today.getDate();

team.forEach((m,i)=>{
  m.colorIdx = i % COLORS.length;
  m.isToday = (m.bday.m === todayM && m.bday.d === todayD);
});

const bdayToday = team.filter(m=>m.isToday);

// ⭐ FIXED: define stars correctly
const bdayStars = bdayToday.length > 0 ? bdayToday : [team[0]];

// ── ALERT ───────────────────────────────────────────────────────────────────
const alertEl = document.getElementById('bday-alert-text');

if (bdayToday.length > 0) {
  const names = bdayToday.map(m=>toFirstName(m.name)).join(' & ');
  alertEl.textContent = `🎂 Happy Birthday, ${names}!`;
} else {
  alertEl.textContent = `No birthdays today`;
}

// ── STATS (FIXED) ───────────────────────────────────────────────────────────
document.getElementById('stat-bday').textContent =
  bdayToday.length > 0
    ? bdayToday.map(m=>toFirstName(m.name)).join(', ')
    : 'None';

// ── ORBIT ───────────────────────────────────────────────────────────────────
function renderOrbit(){
  const wrap = document.getElementById('orbit-wrap');
  [...wrap.querySelectorAll('.center-card,.sat')].forEach(el=>el.remove());

  // CENTER (MULTIPLE PEOPLE)
  const centerEl = document.createElement('div');
  centerEl.className = 'center-card';

  centerEl.innerHTML = `
    <div style="display:flex; gap:10px; justify-content:center;">
      ${bdayStars.map(m=>{
        const c = COLORS[m.colorIdx];
        return `
          <div style="text-align:center;">
            <div class="center-avatar" style="background:${c.light};color:${c.main};border-color:${c.main};">
              ${initials(m.name)}
            </div>
            <div style="font-size:12px;margin-top:6px;">${toFirstName(m.name)}</div>
          </div>
        `;
      }).join('')}
    </div>
    <div class="bday-badge">🎂 Birthday Squad</div>
  `;

  wrap.appendChild(centerEl);

  // SATELLITES (FIXED)
  const others = team.filter(m=>!bdayStars.includes(m));

  others.forEach((member,i)=>{
    const el = document.createElement('div');
    el.className='sat';
    el.style.left = (20 + i*20)+'%';
    el.style.top = '80%';

    el.innerHTML = `
      <div class="sat-avatar">${initials(member.name)}</div>
      <div class="sat-name">${toFirstName(member.name)}</div>
    `;
    wrap.appendChild(el);
  });
}

renderOrbit();

</script>
